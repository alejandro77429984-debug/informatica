
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGA YA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="registro" class="pantalla activa">

<div class="contenedor">

<h1>PAGA YA</h1>
<p>Ingresa tus datos</p>

<form id="registroForm">

<input type="text" id="carnet" placeholder="Carnet Universitario" maxlength="10" required>

<input type="text" id="nombre" placeholder="Nombre Completo" required>

<select id="carrera" required>
<option value="">Selecciona Carrera</option>
<option>Ing Sistemas</option>
<option>Ciencias Educación</option>
<option>Derecho</option>
<option>Contaduría</option>
</select>

<select id="semestre" required>
<option value="">Selecciona Semestre</option>
<option>1er</option>
<option>3er</option>
<option>5to</option>
<option>7mo</option>
<option>9no</option>
</select>

<div class="password-box">
<input type="password" id="password" placeholder="Contraseña" required>
<span id="ojo">👁️</span>
</div>

<button type="submit">Ingresar</button>

</form>

</div>

</section>


<section id="tienda" class="pantalla">

<header>

<h1>Productos Disponibles</h1>

<input type="text" id="buscador" placeholder="Buscar producto">

</header>


<div class="productos" id="listaProductos">

</div>


<div class="carrito">

<h2>Tu Pedido</h2>

<ul id="listaPedido"></ul>

<h3>Total: Bs <span id="total">0</span></h3>

<select id="metodoPago">

<option>Efectivo</option>

<option>QR</option>

</select>

<button id="finalizar">Pagar</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
